services:
  caddy:
    image: caddy
    ports:
      - "172.16.16.1:80:80"
      - "172.16.16.1:443:443"
    networks:
      oauth-labs:
        aliases:
          - server-02.oauth.labs
          - client-02.oauth.labs
    environment:
      - 'TZ=Europe/Zurich'
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./docker/caddy/config:/config
      - ./docker/caddy/data:/data

  db:
    image: mariadb:11.4.3-noble
    volumes:
      - ./docker/db/init.prod.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - oauth-labs
    secrets:
      - db_root_password
    environment:
      MARIADB_ROOT_PASSWORD_FILE: '/var/run/secrets/db_root_password'

  valkey:
    image: valkey/valkey:8.0.1-alpine
    networks:
      - oauth-labs

  server-02:
    image: docker.io/library/server-02
    build:
      context: .
      dockerfile: ./docker/Dockerfile.baselab
      args:
        - 'LAB_NUMBER=02'
        - 'COMPONENT=server'
    networks:
      - oauth-labs
    depends_on:
      - caddy
      - db
      - valkey
    volumes:
      - ./docker/lab02/server.config.yaml:/app/config.yaml
    cpus: 1
    mem_limit: 1g
  
  client-02:
    image: docker.io/library/client-02
    build:
      context: .
      dockerfile: ./docker/Dockerfile.baselab
      args:
        - 'LAB_NUMBER=02'
        - 'COMPONENT=client'
    networks:
      - oauth-labs
    depends_on:
      - caddy
      - db
      - valkey
      - server-02
    volumes:
      - ./docker/lab02/client.config.yaml:/app/config.yaml
    cpus: 1
    mem_limit: 1g

secrets:
  db_root_password:
    file: ./docker/db/root_password.prod.txt

networks:
  oauth-labs:
    name: oauth-labs
    ipam:
      driver: default
      config:
        - subnet: 172.16.16.0/24
          ip_range: 172.16.16.0/24
          gateway: 172.16.16.1
